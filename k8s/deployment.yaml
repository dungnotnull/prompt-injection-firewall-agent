apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-injection-firewall
  labels:
    app: prompt-injection-firewall
    component: security-gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: prompt-injection-firewall
  template:
    metadata:
      labels:
        app: prompt-injection-firewall
        component: security-gateway
    spec:
      serviceAccountName: firewall-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: firewall
          image: prompt-injection-firewall:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: firewall-secrets
                  key: jwt-secret
            - name: FIREWALL_CONFIG
              value: "/app/config/default.yaml"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: models
              mountPath: /app/models
      volumes:
        - name: config
          configMap:
            name: firewall-config
        - name: logs
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: firewall-models-pvc
